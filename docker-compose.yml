# Spins up the Postgres + Redis this app talks to. Run `docker compose up -d`
# before `pnpm start:dev`. Credentials here must match the .env (DB_* / REDIS_*).
services:
  postgres:
    image: postgres:16-alpine
    container_name: nestjs-tasks-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks
    ports:
      - '5432:5432'
    volumes:
      # Named volume => data survives `docker compose down` (use `down -v` to wipe).
      - tasks_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tasks']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis backs the Bull job queue (@nestjs/bull). No volume — queue state here
  # is ephemeral by design for a learning project.
  redis:
    image: redis:7-alpine
    container_name: nestjs-tasks-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  tasks_pgdata:
